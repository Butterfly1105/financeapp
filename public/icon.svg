<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Chart bars -->
  <rect x="96" y="310" width="76" height="130" rx="10" fill="white" opacity="0.25"/>
  <rect x="218" y="240" width="76" height="200" rx="10" fill="white" opacity="0.35"/>
  <rect x="340" y="170" width="76" height="270" rx="10" fill="white" opacity="0.45"/>
  <!-- Trend line -->
  <polyline points="134,285 256,215 378,148" stroke="url(#line)" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="134" cy="285" r="12" fill="#22c55e"/>
  <circle cx="256" cy="215" r="12" fill="#22c55e"/>
  <circle cx="378" cy="148" r="16" fill="#22c55e"/>
  <!-- R$ symbol -->
  <text x="96" y="118" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" opacity="0.9">R$</text>
</svg>
